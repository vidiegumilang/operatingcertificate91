<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jadwal Penerbangan Sekolah</title>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <div class="nav-content">
                <h1 class="logo">✈️ Jadwal Penerbangan Sekolah</h1>
                <div class="nav-links">
                    <a href="index.html" class="nav-link active">Jadwal</a>
                    <a href="admin.html" class="nav-link">Admin Panel</a>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <section class="search-section">
                <div class="search-container">
                    <h2>Cari Jadwal Penerbangan</h2>
                    <div class="search-filters">
                        <div class="filter-group">
                            <label for="searchDate">Tanggal:</label>
                            <input type="date" id="searchDate" placeholder="Pilih tanggal">
                        </div>
                        <div class="filter-group">
                            <label for="searchRoute">Rute:</label>
                            <input type="text" id="searchRoute" placeholder="Cth: Jakarta - Surabaya">
                        </div>
                        <button id="searchBtn" class="btn btn-primary">Cari</button>
                        <button id="resetBtn" class="btn btn-secondary">Reset</button>
                    </div>
                </div>
            </section>

            <section class="flights-section">
                <h2>Daftar Penerbangan</h2>
                <div id="flightsList" class="flights-grid">
                    <!-- Flight cards akan dimuat di sini -->
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadFlights();
            setupSearchFilters();
        });
    </script>
</body>
</html>
